    <div class="header-wrap">
      <header class="header">
        <div class="brand" id="homeBrand" role="link" tabindex="0" aria-label="Go to pogi home">
          <img class="brand-logo" src="assets/images/sslg-logo.png" alt="pogi home logo" />

        <nav class="nav" aria-label="Primary">

              <div class="divider"></div>
              <button>Articles</button>
            </div>
          </div>

          <div class="nav-group">
            <button class="nav-item" data-menu="department">Directory <span class="arrow">▾</span></button>
            <div class="dropdown" data-dropdown="department">
              <button>The Council</button>
              <div class="divider"></div>
              <button>Faculty</button>

            </div>
          </div>

          <div class="nav-group">
            <button class="nav-item" data-menu="event">Events <span class="arrow">▾</span></button>
            <div class="dropdown" data-dropdown="event">
              <button>Calendar</button>
              <div class="divider"></div>
              <button>Clubs</button>
              <div class="divider"></div>
              <button>Evaluation</button>
            </div>
          </div>

          <div class="nav-group">
            <button class="nav-item active" data-menu="materials">Materials <span class="arrow">▾</span></button>
            <div class="dropdown open" data-dropdown="materials">
              <a href="reviewers.html">Reviewers</a>
              <div class="divider"></div>
              <button data-link="pogi drive link">Modules</button>
              <div class="divider"></div>
              <button data-link="pogi drive link">Worksheets</button>
            </div>
          </div>

          <div class="nav-group">
            <button class="nav-item" data-menu="contact">Support <span class="arrow">▾</span></button>
            <div class="dropdown" data-dropdown="contact">
              <button>Contact Us</button>
              <div class="divider"></div>
              <button>FAQs</button>
              <div class="divider"></div>
              <button>Forms</button>
            </div>
          </div>
        </nav>

        <button class="hamburger" id="hamburger" aria-label="Open menu">
          <span></span>
          <span></span>
          <span></span>
        </button>

        <div class="dropdown" id="hamburgerDropdown" style="right: 10px; left: auto; transform: translateY(-8px); min-width: 190px; top: calc(100% - 4px);">
          <button>About</button>
          <div class="divider"></div>
          <button>Campus Tour</button>
          <div class="divider"></div>
          <button>Directory</button>
          <div class="divider"></div>
          <button>Feedback</button>
        </div>
      </header>
    </div>

    <main class="hero">
      <div class="dots"></div>
      <div class="watermark"></div>
      <div class="hero-inner">
        <h1 class="title">Reviewers</h1>
        <div class="title-underline"></div>

        

    <div class="footer-wrap">
      <footer class="footer">
        <a class="footer-left" id="footerHome" href="pogi home footer" aria-label="Go to home footer">
          <img class="footer-logo" src="assets/images/footer-logo.png" alt="pogi home footer" />
          <img class="footer-image-text" src="assets/images/sslg-fullname.png" alt="pogi home footer" />
        </a>x

        <div class="socials" aria-label="Social media links">
          <a class="social-link" href="pogi socmed 1" target="_blank" rel="noopener" aria-label="pogi altext 1">
            <img src="assets/images/logo_yt.png" alt="pogi altext 1" />
          </a>
          <a class="social-link" href="pogi socmed 2" target="_blank" rel="noopener" aria-label="pogi altext 2">
            <img src="assets/images/logo_tt.png" alt="pogi altext 2" />
          </a>
          <a class="social-link" href="https://www.facebook.com/LPSciSSLG" target="_blank" rel="noopener" aria-label="pogi altext 3">
            <img src="assets/images/logo_fb.png" alt="pogi altext 3" />
          </a>
          <a class="social-link" href="https://www.instagram.com/lpsci_sslg/" target="_blank" rel="noopener" aria-label="pogi altext 4">
            <img src="assets/images/logo_ig.png" alt="pogi altext 4" />
          </a>
        </div>
        <div class="footer-watermark"></div>
      </footer>
    </div>
  </div>

  <script>
    const navItems = [...document.querySelectorAll('.nav-item')];
    const dropdowns = [...document.querySelectorAll('.dropdown[data-dropdown]')];
    const hamburger = document.getElementById('hamburger');
    const hamburgerDropdown = document.getElementById('hamburgerDropdown');
    const homeBrand = document.getElementById('homeBrand');

    function closeAll() {
      navItems.forEach(btn => btn.classList.remove('active'));
      dropdowns.forEach(menu => menu.classList.remove('open'));
      hamburgerDropdown.classList.remove('open');
      hamburger.classList.remove('open');
    }

   navItems.forEach(btn => {
  btn.addEventListener('click', () => {
    const key = btn.getAttribute('data-menu');
    const menu = document.querySelector(`.dropdown[data-dropdown="${key}"]`);

    closeAll();

    // ✅ If dropdown exists → open it
    if (menu) {
      menu.classList.add('open');
    }

    // ✅ ALWAYS add underline
    btn.classList.add('active');
  });
});

    hamburger.addEventListener('click', (e) => {
      e.stopPropagation();
      const isOpen = hamburgerDropdown.classList.contains('open');

      navItems.forEach(btn => btn.classList.remove('active'));
      dropdowns.forEach(menu => menu.classList.remove('open'));

      if (isOpen) {
        hamburgerDropdown.classList.remove('open');
        hamburger.classList.remove('open');
      } else {
        hamburgerDropdown.classList.add('open');
        hamburger.classList.add('open');
      }
    });

    document.addEventListener('click', (e) => {
      const insideHeader = e.target.closest('.header-wrap');
      const insideFooter = e.target.closest('.footer-wrap');
      if (!insideHeader && !insideFooter) closeAll();
    });

    homeBrand.addEventListener('click', () => {
      window.location.href = 'pogi home';
    });

    homeBrand.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') window.location.href = 'pogi home';
    });

    document.getElementById('footerHome').addEventListener('click', (e) => {
      e.preventDefault();
      window.location.href = 'pogi home footer';
    });

    document.querySelectorAll('[data-link]').forEach(btn => {
      btn.addEventListener('click', () => {
        window.open('pogi drive link', '_blank', 'noopener');
      });
    });

    document.querySelectorAll('.card-link').forEach(card => {
      card.addEventListener('pointerdown', () => card.classList.add('active'));
      card.addEventListener('pointerup', () => card.classList.remove('active'));
      card.addEventListener('pointerleave', () => card.classList.remove('active'));
      card.addEventListener('blur', () => card.classList.remove('active'));
    });
  </script>
</body>
</html>
